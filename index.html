<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cards | jakublabs.xyz</title>
    <link rel="stylesheet" href="styles.css?v=1" />
  </head>
  <body>
    <main class="cards-page" aria-labelledby="page-title">
      <section class="hero">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>cards.jakublabs.xyz</span>
        </div>
        <h1 id="page-title">Cards</h1>
        <p class="lede">open packs, collect cards, sell duplicates, build fake credit wealth</p>
      </section>

      <section class="wallet">
        <div>
          <span>credits</span>
          <strong id="credits">100</strong>
        </div>
        <div>
          <span>cards owned</span>
          <strong id="owned-count">0</strong>
        </div>
        <div>
          <span>packs owned</span>
          <strong id="pack-count">0</strong>
        </div>
      </section>

      <nav class="tabs" aria-label="Cards sections">
        <button class="tab active" data-panel="packs-panel" type="button">Packs</button>
        <button class="tab" data-panel="inventory-panel" type="button">Inventory</button>
        <button class="tab" data-panel="catalog-panel" type="button">Catalog</button>
      </nav>

      <section class="panel active" id="packs-panel">
        <div class="section-heading">
          <p class="kicker">pack shop</p>
          <h2>buy and open packs</h2>
        </div>
        <div class="pack-grid" id="pack-shop"></div>
        <div class="owned-packs" id="owned-packs"></div>
      </section>

      <section class="panel" id="inventory-panel">
        <div class="section-heading">
          <p class="kicker">inventory</p>
          <h2>your cards</h2>
        </div>
        <div class="filters" aria-label="Inventory sorting and filtering">
          <input id="inventory-search" type="search" placeholder="Search inventory" />
          <select id="inventory-edition" aria-label="Filter inventory by edition">
            <option value="All">All editions</option>
            <option value="Basic">Basic</option>
            <option value="Uncommon">Uncommon</option>
            <option value="Rare">Rare</option>
            <option value="Epic">Epic</option>
            <option value="Legendary">Legendary</option>
            <option value="Mythic">Mythic</option>
          </select>
          <select id="inventory-limited" aria-label="Filter inventory by limited edition status">
            <option value="All">All cards</option>
            <option value="Limited">Limited only</option>
            <option value="Standard">Standard only</option>
          </select>
          <select id="inventory-sort" aria-label="Sort inventory">
            <option value="owned-desc">Most owned</option>
            <option value="name-asc">Name A-Z</option>
            <option value="power-desc">Highest power</option>
            <option value="power-asc">Lowest power</option>
            <option value="worth-desc">Highest worth</option>
            <option value="edition">Edition</option>
          </select>
        </div>
        <div class="cards-grid" id="inventory-grid"></div>
      </section>

      <section class="panel" id="catalog-panel">
        <div class="section-heading">
          <p class="kicker">catalog</p>
          <h2>all cards</h2>
        </div>
        <div class="filters" aria-label="Catalog sorting and filtering">
          <input id="catalog-search" type="search" placeholder="Search catalog" />
          <select id="catalog-edition" aria-label="Filter catalog by edition">
            <option value="All">All editions</option>
            <option value="Basic">Basic</option>
            <option value="Uncommon">Uncommon</option>
            <option value="Rare">Rare</option>
            <option value="Epic">Epic</option>
            <option value="Legendary">Legendary</option>
            <option value="Mythic">Mythic</option>
          </select>
          <select id="catalog-limited" aria-label="Filter catalog by limited edition status">
            <option value="All">All cards</option>
            <option value="Limited">Limited only</option>
            <option value="Standard">Standard only</option>
          </select>
          <select id="catalog-sort" aria-label="Sort catalog">
            <option value="name-asc">Name A-Z</option>
            <option value="power-desc">Highest power</option>
            <option value="power-asc">Lowest power</option>
            <option value="worth-desc">Highest worth</option>
            <option value="edition">Edition</option>
          </select>
        </div>
        <div class="cards-grid" id="catalog-grid"></div>
      </section>

      <section class="redeem-box" aria-labelledby="redeem-title">
        <div>
          <p class="kicker">redeem</p>
          <h2 id="redeem-title">code drop</h2>
        </div>
        <form id="redeem-form" class="redeem-form">
          <input id="redeem-code" type="text" placeholder="Enter code" autocomplete="off" />
          <button class="button button-light" type="submit">Redeem</button>
        </form>
        <p id="redeem-message" class="redeem-message" role="status"></p>
      </section>
    </main>

    <dialog id="card-dialog" class="modal">
      <button class="close" id="close-card" type="button" aria-label="Close">x</button>
      <div id="card-detail"></div>
      <div class="modal-actions">
        <button class="button button-dark" id="render-card" type="button">Render PNG</button>
        <button class="button button-light" id="sell-card" type="button">Sell Card</button>
      </div>
      <canvas id="render-canvas" width="900" height="1260" hidden></canvas>
    </dialog>

    <dialog id="opening-dialog" class="modal opening-modal">
      <div class="pack-opening" id="pack-opening"></div>
      <button class="button button-light" id="next-reveal" type="button">Reveal</button>
    </dialog>

    <script src="script.js?v=1"></script>
  </body>
</html>
